definitions:
  address.Address:
    properties:
      city:
        type: string
      country:
        type: string
      id:
        type: integer
      is_default:
        type: boolean
      postal_code:
        type: string
      state:
        type: string
      street:
        type: string
      user_id:
        type: integer
    type: object
  category.Category:
    properties:
      description:
        type: string
      id:
        type: integer
      is_active:
        type: boolean
      name:
        type: string
      parent_id:
        type: integer
      slug:
        type: string
    type: object
  errdto.ErrorResponse:
    properties:
      code:
        type: integer
      message:
        type: string
    type: object
  product.Product:
    properties:
      categories:
        items:
          $ref: '#/definitions/category.Category'
        type: array
      description:
        type: string
      id:
        type: integer
      is_active:
        type: boolean
      is_featured:
        type: boolean
      name:
        type: string
      price:
        type: number
      reviews:
        items:
          $ref: '#/definitions/review.Review'
        type: array
      sku:
        type: string
      stock:
        type: integer
    type: object
  review.Review:
    properties:
      comment:
        type: string
      id:
        type: integer
      product_id:
        type: integer
      rating:
        type: integer
      title:
        type: string
      user_id:
        type: integer
    type: object
  tax.Tax:
    properties:
      amount:
        type: number
      state:
        type: string
    type: object
  user.User:
    properties:
      email:
        type: string
      first_name:
        type: string
      id:
        type: integer
      last_name:
        type: string
      password:
        type: string
    type: object
info:
  contact: {}
paths:
