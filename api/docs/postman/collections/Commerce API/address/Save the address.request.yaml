$kind: http-request
name: Save the address
method: POST
url: '{{baseUrl}}/api/address'
order: 1000
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "id": 0,
      "user_id": 0,
      "street": "123 Main St",
      "city": "Springfield",
      "state": "IL",
      "postal_code": "62701",
      "country": "US",
      "is_default": false
    }
